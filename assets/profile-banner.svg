<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 360"
  role="img"
  aria-labelledby="title desc"
  preserveAspectRatio="xMidYMid meet"
>
  <title>Zichen Wang profile banner</title>
  <desc>
    An elegant dark blue and teal banner connecting chemistry, intelligence,
    research, and engineering.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f" />
      <stop offset="52%" stop-color="#0a2531" />
      <stop offset="100%" stop-color="#0a3b3a" />
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78e3d4" />
      <stop offset="100%" stop-color="#a8c7ff" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#53d5c7" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#53d5c7" stop-opacity="0" />
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path
        d="M 40 0 L 0 0 0 40"
        fill="none"
        stroke="#d7fff8"
        stroke-opacity="0.055"
        stroke-width="1"
      />
    </pattern>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#background)" />
  <rect width="1200" height="360" rx="28" fill="url(#grid)" />
  <circle cx="1035" cy="105" r="245" fill="url(#glow)" />
  <circle
    cx="1000"
    cy="178"
    r="126"
    fill="none"
    stroke="#8ae8dc"
    stroke-opacity="0.12"
    stroke-width="1.5"
  />
  <circle
    cx="1000"
    cy="178"
    r="86"
    fill="none"
    stroke="#aecbff"
    stroke-opacity="0.16"
    stroke-width="1.5"
  />

  <g stroke-linecap="round" stroke-linejoin="round">
    <path
      d="M906 129 L969 91 L1036 127 L1063 196 L1017 253 L943 248 L899 191 Z"
      fill="none"
      stroke="#9ceee3"
      stroke-opacity="0.32"
      stroke-width="2"
    />
    <path
      d="M969 91 L980 176 L1063 196 M899 191 L980 176 L1017 253 M1036 127 L980 176 L943 248"
      fill="none"
      stroke="#b7d2ff"
      stroke-opacity="0.22"
      stroke-width="1.5"
    />

    <g fill="#bff9f1">
      <circle cx="906" cy="129" r="5" />
      <circle cx="969" cy="91" r="7" />
      <circle cx="1036" cy="127" r="5" />
      <circle cx="1063" cy="196" r="7" />
      <circle cx="1017" cy="253" r="5" />
      <circle cx="943" cy="248" r="7" />
      <circle cx="899" cy="191" r="5" />
      <circle cx="980" cy="176" r="9" />
    </g>

    <g fill="#a9c8ff">
      <circle cx="969" cy="91" r="16" opacity="0.12" filter="url(#softGlow)" />
      <circle cx="1063" cy="196" r="18" opacity="0.13" filter="url(#softGlow)" />
      <circle cx="943" cy="248" r="16" opacity="0.12" filter="url(#softGlow)" />
    </g>
  </g>

  <rect x="84" y="72" width="52" height="4" rx="2" fill="url(#accent)" />

  <text
    x="84"
    y="112"
    fill="#b7d2d8"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="15"
    font-weight="600"
    letter-spacing="4"
  >
    PEKING UNIVERSITY · BEIJING
  </text>

  <text
    x="80"
    y="190"
    fill="#f5fbfc"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="62"
    font-weight="700"
    letter-spacing="7"
  >
    ZICHEN WANG
  </text>

  <text
    x="84"
    y="236"
    fill="url(#accent)"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="5"
  >
    CHEMISTRY × INTELLIGENCE
  </text>

  <text
    x="84"
    y="287"
    fill="#a9bec5"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="15"
    font-weight="500"
    letter-spacing="3"
  >
    RESEARCH · ENGINEERING · SCIENTIFIC TOOLS
  </text>
</svg>
